name: "Setup Konveyor Infrastructure"
description: "Sets up Minikube, Konveyor, Llemulator, and configures authentication for infrastructure tests"

inputs:
  namespace:
    description: "Kubernetes namespace for Konveyor"
    required: false
    default: "konveyor-tackle"
  admin_password:
    description: "Password for the admin user"
    required: false
    default: "admin"
  llm_model:
    description: "LLM model to use"
    required: false
    default: "gpt-4o"
  llm_provider:
    description: "LLM provider"
    required: false
    default: "openai"

outputs:
  hub_url:
    description: "URL of the Konveyor Hub"
    value: ${{ steps.wait_ingress.outputs.hub_url }}
  llemulator_url:
    description: "External URL of llemulator for test access"
    value: ${{ steps.expose_llemulator.outputs.llemulator_url }}
  admin_username:
    description: "Admin username"
    value: "admin"
  admin_password:
    description: "Admin password"
    value: ${{ inputs.admin_password }}

runs:
  using: "composite"
  steps:
    - name: Checkout Konveyor Operator (for scripts)
      uses: actions/checkout@v4
      with:
        repository: konveyor/operator
        path: konveyor-operator
        ref: main

    - name: Start Minikube
      uses: konveyor/operator/.github/actions/start-minikube@main
      with:
        cpus: "max"
        memory: "max"

    - name: Setup Namespace and Secrets
      shell: bash
      run: |
        echo "=== Creating namespace and secrets ==="
        kubectl create namespace ${{ inputs.namespace }} || true

        # Create API key secret for LLM proxy
        kubectl create secret generic kai-api-keys \
          --from-literal=OPENAI_API_KEY=dummy-key-for-llemulator \
          -n ${{ inputs.namespace }} \
          --dry-run=client -o yaml | kubectl apply -f -

        echo "✓ Namespace and secrets created"

    - name: Deploy Llemulator
      shell: bash
      run: |
        echo "=== Deploying llemulator ==="
        cd konveyor-operator
        ./test/e2e/llm-proxy/setup-llemulator.sh
        cd ..

        echo "=== Verifying llemulator deployment ==="
        kubectl get deployment llemulator -n ${{ inputs.namespace }}
        kubectl get service llemulator -n ${{ inputs.namespace }}

        echo "=== Waiting for llemulator to be ready ==="
        kubectl wait --for=condition=available --timeout=300s deployment/llemulator -n ${{ inputs.namespace }}

        echo "✓ Llemulator deployed and ready"

    - name: Expose Llemulator for External Access
      id: expose_llemulator
      shell: bash
      run: |
        echo "=== Exposing llemulator for external access ==="

        # Create a new NodePort service for external access
        cat <<EOF | kubectl apply -f -
        apiVersion: v1
        kind: Service
        metadata:
          name: llemulator-external
          namespace: ${{ inputs.namespace }}
        spec:
          type: NodePort
          selector:
            app: llemulator
          ports:
            - port: 80
              targetPort: 8080
              nodePort: 30089
        EOF

        MINIKUBE_IP=$(minikube ip)
        LLEMULATOR_URL="http://${MINIKUBE_IP}:30089/v1"
        echo "llemulator_url=${LLEMULATOR_URL}" >> $GITHUB_OUTPUT

        echo "Llemulator external URL: ${LLEMULATOR_URL}"

        # Wait for service to be ready
        for i in {1..30}; do
          if curl -s "${LLEMULATOR_URL}/chat/completions" -H "Content-Type: application/json" -d '{"model":"gpt-4o","messages":[]}' > /dev/null 2>&1; then
            echo "✓ Llemulator service is ready"
            break
          fi
          echo "Waiting for llemulator external access... ($i/30)"
          sleep 2
        done

    - name: Verify Llemulator Direct Access
      shell: bash
      run: |
        echo "=== Testing llemulator direct access ==="
        LLEMULATOR_URL="${{ steps.expose_llemulator.outputs.llemulator_url }}"
        echo "Testing llemulator at: ${LLEMULATOR_URL}"

        RESPONSE=$(curl -s -X POST "${LLEMULATOR_URL}/chat/completions" \
          -H "Content-Type: application/json" \
          -H "Authorization: Bearer dummy-key-for-llemulator" \
          -d '{"model": "gpt-4o", "messages": [{"role": "user", "content": "test"}]}')

        echo "Llemulator response: $RESPONSE"

        if echo "$RESPONSE" | grep -q "choices"; then
          echo "✓ Llemulator is responding correctly (direct access)"
        else
          echo "✗ Llemulator did not return a valid response"
          exit 1
        fi

    - name: Install Konveyor
      uses: konveyor/operator/.github/actions/install-konveyor@main
      with:
        namespace: ${{ inputs.namespace }}
        tackle_cr: |
          kind: Tackle
          apiVersion: tackle.konveyor.io/v1alpha1
          metadata:
            name: tackle
          spec:
            feature_auth_required: true
            kai_solution_server_enabled: true
            kai_llm_proxy_enabled: true
            kai_llm_model: ${{ inputs.llm_model }}
            kai_llm_provider: ${{ inputs.llm_provider }}
            kai_llm_baseurl: http://llemulator.${{ inputs.namespace }}.svc.cluster.local/v1
            kai_api_key_secret_name: kai-api-keys

    - name: Wait for Ingress
      id: wait_ingress
      shell: bash
      run: |
        echo "=== Waiting for ingress to be ready ==="
        kubectl wait \
          -n ${{ inputs.namespace }} \
          ingress/tackle \
          --timeout=600s \
          --for=jsonpath='{.status.loadBalancer.ingress[0]}'

        minikube_ip=$(minikube ip)
        HUB_URL="https://${minikube_ip}"
        echo "Minikube IP: ${minikube_ip}"
        echo "hub_url=${HUB_URL}" >> $GITHUB_OUTPUT

        echo "✓ Ingress is ready"

    - name: Configure Hub Admin Credentials
      shell: bash
      env:
        ADMIN_PASSWORD: ${{ inputs.admin_password }}
        NAMESPACE: ${{ inputs.namespace }}
        HUB_URL: ${{ steps.wait_ingress.outputs.hub_url }}
      run: |
        echo "=== Waiting for Hub auth to be ready ==="

        # Hub seeds admin:admin by default. Poll until PAT creation works.
        echo -n "Waiting for Hub PAT endpoint..."
        HUB_READY=false
        for i in $(seq 1 30); do
          HTTP_CODE=$(curl -s -k -o /dev/null -w "%{http_code}" \
            -X POST "${HUB_URL}/hub/auth/tokens" \
            -H "Content-Type: application/json" \
            -u "${ADMIN_PASSWORD}:${ADMIN_PASSWORD}" \
            -d '{"lifespan": 1}' 2>/dev/null || echo "000")
          if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "201" ]; then
            echo " ready (HTTP $HTTP_CODE)"
            HUB_READY=true
            break
          fi
          echo -n "."
          sleep 5
        done

        if [ "$HUB_READY" != "true" ]; then
          echo ""
          echo "Timeout waiting for Hub auth endpoint (last HTTP: $HTTP_CODE)"
          echo "Hub logs:"
          kubectl logs -n "${NAMESPACE}" deployment/tackle-hub --tail=50 || true
          exit 1
        fi

        echo "✓ Hub admin ready (${ADMIN_PASSWORD}:${ADMIN_PASSWORD})"

    - name: Seed Hub with Test Data
      shell: bash
      env:
        HUB_URL: ${{ steps.wait_ingress.outputs.hub_url }}
        USERNAME: "admin"
        PASSWORD: ${{ inputs.admin_password }}
      run: |
        echo "=== Seeding Hub with test data ==="
        chmod +x ./tests/scripts/seed-hub.sh
        ./tests/scripts/seed-hub.sh

    - name: Wait for LLM Proxy and Solution Server
      shell: bash
      run: |
        echo "=== Checking if deployments exist ==="
        for i in {1..60}; do
          if kubectl get deployment llm-proxy -n ${{ inputs.namespace }} > /dev/null 2>&1; then
            echo "✓ llm-proxy deployment found"
            break
          fi
          echo "Waiting for llm-proxy deployment to be created... ($i/60)"
          sleep 5
        done

        echo "=== Waiting for deployments to be ready ==="
        kubectl wait --for=condition=available --timeout=600s deployment/llm-proxy -n ${{ inputs.namespace }}
        kubectl wait --for=condition=available --timeout=600s deployment/kai-api -n ${{ inputs.namespace }}

        echo "=== Deployment status ==="
        kubectl get deployments -n ${{ inputs.namespace }} | grep -E 'llm-proxy|kai-api|kai-db|llemulator'
        kubectl get pods -n ${{ inputs.namespace }} | grep -E 'llm-proxy|kai-api|kai-db|llemulator'

        echo "✓ LLM proxy and solution server enabled"

    - name: Verify LLM Proxy Health
      shell: bash
      run: |
        echo "=== Checking LLM proxy health ==="

        # Check if llm-proxy is healthy
        POD=$(kubectl get pods -n ${{ inputs.namespace }} -l app.kubernetes.io/name=llm-proxy -o jsonpath='{.items[0].metadata.name}')
        if [ -z "$POD" ]; then
          echo "✗ No llm-proxy pod found"
          exit 1
        fi

        echo "LLM Proxy pod: $POD"
        kubectl get pod $POD -n ${{ inputs.namespace }}

        echo "✓ LLM proxy is running"

    - name: Register LLM Model in LLM Proxy
      shell: bash
      env:
        HUB_URL: ${{ steps.wait_ingress.outputs.hub_url }}
        ADMIN_PASSWORD: ${{ inputs.admin_password }}
        LLM_MODEL: ${{ inputs.llm_model }}
      run: |
        echo "=== Registering LLM model in llama_stack ==="

        PAT_RESPONSE=$(curl -s -k -X POST "${HUB_URL}/hub/auth/tokens" \
          -H "Content-Type: application/json" \
          -u "${ADMIN_PASSWORD}:${ADMIN_PASSWORD}" \
          -d '{"lifespan": 1}')
        HUB_TOKEN=$(echo "$PAT_RESPONSE" | jq -r '.token // empty')
        if [ -z "$HUB_TOKEN" ]; then
          echo "Could not get Hub PAT — skipping model registration"
          exit 0
        fi

        LLM_PROXY="${HUB_URL}/hub/services/llm-proxy/v1"

        # Check if the model is already registered
        MODELS=$(curl -s -k "${LLM_PROXY}/models" -H "Authorization: Bearer ${HUB_TOKEN}")
        echo "Current models: $MODELS"
        if echo "$MODELS" | jq -e --arg m "$LLM_MODEL" '.data[]? | select(.id == $m or .model_id == $m)' > /dev/null 2>&1; then
          echo "✓ Model '${LLM_MODEL}' already registered"
          exit 0
        fi

        # Find the inference provider_id
        PROVIDERS=$(curl -s -k "${LLM_PROXY}/providers" -H "Authorization: Bearer ${HUB_TOKEN}")
        echo "Available providers: $PROVIDERS"
        PROVIDER_ID=$(echo "$PROVIDERS" | jq -r '.data[]? | select(.provider_type | test("openai|inference"; "i")) | .provider_id' | head -1)
        if [ -z "$PROVIDER_ID" ]; then
          # Fallback: use the first provider available
          PROVIDER_ID=$(echo "$PROVIDERS" | jq -r '.data[0]?.provider_id // empty')
        fi
        if [ -z "$PROVIDER_ID" ]; then
          echo "No provider found — skipping model registration"
          exit 0
        fi
        echo "Using provider_id: ${PROVIDER_ID}"

        REG_RESPONSE=$(curl -s -k -X POST "${LLM_PROXY}/models" \
          -H "Content-Type: application/json" \
          -H "Authorization: Bearer ${HUB_TOKEN}" \
          -d "{
            \"model_id\": \"${LLM_MODEL}\",
            \"provider_id\": \"${PROVIDER_ID}\",
            \"provider_model_id\": \"${LLM_MODEL}\",
            \"model_type\": \"llm\"
          }")
        echo "Registration response: $REG_RESPONSE"

        if echo "$REG_RESPONSE" | jq -e '.model_id // .id' > /dev/null 2>&1; then
          echo "✓ Model '${LLM_MODEL}' registered successfully"
        else
          echo "Model registration did not confirm — proceeding anyway"
        fi

    - name: Verify Llemulator via LLM Proxy
      shell: bash
      env:
        HUB_URL: ${{ steps.wait_ingress.outputs.hub_url }}
        ADMIN_PASSWORD: ${{ inputs.admin_password }}
        NAMESPACE: ${{ inputs.namespace }}
        LLM_MODEL: ${{ inputs.llm_model }}
      run: |
        echo "=== Testing llemulator access through Hub LLM proxy ==="

        # Create a PAT using Hub Basic Auth (admin:admin by default)
        echo "Creating Hub PAT for LLM proxy test..."
        PAT_RESPONSE=$(curl -s -k -X POST "${HUB_URL}/hub/auth/tokens" \
          -H "Content-Type: application/json" \
          -u "${ADMIN_PASSWORD}:${ADMIN_PASSWORD}" \
          -d '{"lifespan": 1}')

        HUB_TOKEN=$(echo "$PAT_RESPONSE" | jq -r '.token // empty')
        if [ -z "$HUB_TOKEN" ]; then
          echo "Failed to create Hub PAT. Response: $PAT_RESPONSE"
          echo "Skipping LLM proxy verification (Hub auth not reachable)"
          exit 0
        fi
        echo "✓ Got Hub PAT"

        # Route LLM proxy request through Hub's reverse proxy
        # Per operator#567: llm_proxy_url uses Hub's /services/llm-proxy path
        RESPONSE=$(curl -s -k -X POST \
          "${HUB_URL}/hub/services/llm-proxy/v1/chat/completions" \
          -H "Content-Type: application/json" \
          -H "Authorization: Bearer ${HUB_TOKEN}" \
          -d "{\"model\": \"${LLM_MODEL}\", \"messages\": [{\"role\": \"user\", \"content\": \"test via proxy\"}]}")

        echo "LLM Proxy response: $RESPONSE"

        if echo "$RESPONSE" | grep -q "choices"; then
          echo "✓ LLM Proxy reachable via Hub reverse proxy"
        else
          echo "✗ LLM Proxy failed via Hub reverse proxy"
          echo "Hub logs:"
          kubectl logs -n "${NAMESPACE}" deployment/tackle-hub --tail=50 || true
          echo "LLM Proxy logs:"
          kubectl logs -n "${NAMESPACE}" deployment/llm-proxy --tail=50 || true
          exit 1
        fi
