name: Release

on:
  workflow_call:
    inputs:
      tag_name:
        description: "Tag name for the release"
        required: true
        type: string
      prerelease:
        description: "Is this a pre-release?"
        required: true
        type: boolean
      vsix_artifact_name:
        description: "Name of the VSIX artifact to download"
        required: false
        type: string
        default: "vsix-artifact"
      workflow_run_id:
        description: "Workflow run ID to download artifacts from"
        required: false
        type: string

env:
  HUSKY: 0

jobs:
  generate_changelog:
    name: Generate Changelog
    uses: konveyor/release-tools/.github/workflows/generate-changelog.yml@main
    with:
      version: ${{ inputs.tag_name }}
      prev_version: $(gh api repos/${{ github.repository }}/releases/latest | jq -r '.tag_name')
      repository: ${{ github.repository }}
      ref: ${{ github.sha }}
    secrets:
      token: ${{ secrets.GITHUB_TOKEN }}

  release:
    name: Final Release
    runs-on: ubuntu-latest
    needs: generate_changelog
    steps:
      - name: Add release details to the step summary
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          ## Release Information
          Tag: __${{ inputs.tag_name }}__
          Pre-Release: __${{ inputs.prerelease }}__
          VSIX Artifact: __${{ inputs.vsix_artifact_name }}__
          Workflow Run ID: __${{ inputs.workflow_run_id || github.run_id }}__
          EOF

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Changelog Artifact
        uses: actions/download-artifact@v4
        with:
          name: changelog-artifact
          path: ./artifacts

      - name: Download VSIX Artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.vsix_artifact_name }}
          path: ./artifacts

      - name: Verify Downloaded Artifacts
        run: |
          echo "All artifacts:"
          ls -R ./artifacts/
          echo ""
          echo "VSIX files:"
          find ./artifacts -name "*.vsix" -ls

      - name: Find VSIX files
        id: vsix_info
        run: |
          VSIX_FILES=$(find ./artifacts -name "*.vsix" -type f | sort)
          VSIX_COUNT=$(echo "$VSIX_FILES" | wc -l)
          echo "Found $VSIX_COUNT VSIX files"
          echo "$VSIX_FILES"

          # Store as newline-separated list
          echo "vsix_files<<EOF" >> "$GITHUB_OUTPUT"
          echo "$VSIX_FILES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

          # Store artifact pattern for GitHub Release
          echo "vsix_pattern=./artifacts/*.vsix" >> "$GITHUB_OUTPUT"

      - name: Set up Node.js for publishing
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"

      - name: Publish to VS Code Marketplace
        if: ${{ inputs.prerelease == false }}
        run: |
          echo "Publishing all extensions to VS Code Marketplace..."
          while IFS= read -r VSIX_FILE; do
            echo "Publishing $(basename "$VSIX_FILE")..."
            if [ -f "./artifacts/release.md" ]; then
              npx @vscode/vsce publish --packagePath "$VSIX_FILE" --changelog-path "./artifacts/release.md"
            else
              npx @vscode/vsce publish --packagePath "$VSIX_FILE"
            fi
            echo "✅ Published $(basename "$VSIX_FILE")"
          done <<< "${{ steps.vsix_info.outputs.vsix_files }}"
        env:
          VSCE_PAT: ${{ secrets.VSCODE_MARKETPLACE_TOKEN }}

      - name: Publish to Open VSX Registry
        if: ${{ inputs.prerelease == false }}
        run: |
          echo "Publishing all extensions to Open VSX Registry..."
          while IFS= read -r VSIX_FILE; do
            echo "Publishing $(basename "$VSIX_FILE")..."
            npx ovsx publish "$VSIX_FILE" --pat "$OVSX_PAT"
            echo "✅ Published $(basename "$VSIX_FILE")"
          done <<< "${{ steps.vsix_info.outputs.vsix_files }}"
        env:
          OVSX_PAT: ${{ secrets.OVSX_MARKETPLACE_TOKEN }}

      - name: Create Release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ inputs.tag_name }}
          commit: ${{ github.sha }}
          bodyFile: ./artifacts/release.md
          artifacts: |
            ./artifacts/*.vsix
          prerelease: ${{ inputs.prerelease }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
