name: MTA CI

on:
  push:
    branches:
      - main
      - release-*
      - 'feature/**'
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - release-*
    paths-ignore:
      - 'docs/**'
      - '*.md'
  workflow_dispatch:
    inputs:
      upstream_ref:
        description: 'Override upstream ref (branch, tag, or SHA)'
        required: false
        type: string
  workflow_call:

env:
  HUSKY: 0

concurrency:
  group: mta-ci-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout MTA build repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install MTA build dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint --if-present

  build:
    name: Build Extension
    needs: lint
    runs-on: ubuntu-latest

    outputs:
      upstream_sha: ${{ steps.build_info.outputs.upstream_sha }}
      upstream_sha_short: ${{ steps.build_info.outputs.upstream_sha_short }}
      mta_version: ${{ steps.build_info.outputs.mta_version }}

    steps:
      - name: Checkout MTA build repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install MTA build dependencies
        run: npm ci

      - name: Pull upstream and apply MTA branding
        run: |
          if [[ -n "${{ inputs.upstream_ref }}" ]]; then
            echo "Using override upstream ref: ${{ inputs.upstream_ref }}"
            npm run pull-upstream -- --ref=${{ inputs.upstream_ref }}
          else
            echo "Using configured upstream ref from mta-build.yaml"
            npm run pull-upstream
          fi

      - name: Extract build info
        id: build_info
        working-directory: ./.upstream-workspace
        run: |
          UPSTREAM_SHA=$(git rev-parse HEAD)
          UPSTREAM_SHA_SHORT=$(git rev-parse --short HEAD)
          echo "upstream_sha=${UPSTREAM_SHA}" >> $GITHUB_OUTPUT
          echo "upstream_sha_short=${UPSTREAM_SHA_SHORT}" >> $GITHUB_OUTPUT

          # Get MTA version from core extension package.json
          MTA_VERSION=$(node -p "require('./vscode/core/package.json').version")
          echo "mta_version=${MTA_VERSION}" >> $GITHUB_OUTPUT

      - name: Display build configuration
        run: |
          echo "## MTA Build Configuration" >> $GITHUB_STEP_SUMMARY
          echo "- **Upstream SHA**: \`${{ steps.build_info.outputs.upstream_sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **MTA Version**: \`${{ steps.build_info.outputs.mta_version }}\`" >> $GITHUB_STEP_SUMMARY

      - name: Install upstream dependencies
        working-directory: ./.upstream-workspace
        run: |
          npm ci

      - name: Build extension
        working-directory: ./.upstream-workspace
        run: npm run build

      - name: Verify MTA branding applied
        working-directory: ./.upstream-workspace
        run: |
          # Check core extension
          CORE_NAME=$(node -p "require('./vscode/core/package.json').name")
          if [[ "$CORE_NAME" != "mta-core" ]]; then
            echo "❌ FATAL: Core extension branding failed!"
            echo "❌ Expected: mta-core, got: $CORE_NAME"
            exit 1
          fi
          echo "✅ Core extension: $CORE_NAME"

          # Check extension pack
          PACK_NAME=$(node -p "require('./vscode/konveyor/package.json').name")
          if [[ "$PACK_NAME" != "mta-vscode-extension" ]]; then
            echo "❌ FATAL: Extension pack branding failed!"
            echo "❌ Expected: mta-vscode-extension, got: $PACK_NAME"
            exit 1
          fi
          echo "✅ Extension pack: $PACK_NAME"

          # Check language extensions
          for lang in java javascript go csharp; do
            LANG_NAME=$(node -p "require('./vscode/${lang}/package.json').name")
            EXPECTED="mta-${lang}"
            if [[ "$LANG_NAME" != "$EXPECTED" ]]; then
              echo "❌ FATAL: ${lang} extension branding failed!"
              echo "❌ Expected: $EXPECTED, got: $LANG_NAME"
              exit 1
            fi
            echo "✅ ${lang} extension: $LANG_NAME"
          done

          echo "✅ All MTA branding verifications passed"

  test:
    name: Test
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout MTA build repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install MTA build dependencies
        run: npm ci

      - name: Pull upstream and apply MTA branding
        run: |
          if [[ -n "${{ inputs.upstream_ref }}" ]]; then
            echo "Using override upstream ref: ${{ inputs.upstream_ref }}"
            npm run pull-upstream -- --ref=${{ inputs.upstream_ref }}
          else
            echo "Using configured upstream ref from mta-build.yaml"
            npm run pull-upstream
          fi

      - name: Install upstream dependencies
        run: npm ci
        working-directory: ./.upstream-workspace

      - name: Run tests
        run: xvfb-run -a npm test
        working-directory: ./.upstream-workspace

  package:
    name: Package Extension
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout MTA build repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install MTA build dependencies
        run: npm ci

      - name: Pull upstream and apply MTA branding
        run: |
          if [[ -n "${{ inputs.upstream_ref }}" ]]; then
            echo "Using override upstream ref: ${{ inputs.upstream_ref }}"
            npm run pull-upstream -- --ref=${{ inputs.upstream_ref }}
          else
            echo "Using configured upstream ref from mta-build.yaml"
            npm run pull-upstream
          fi

      - name: Install dependencies and build
        working-directory: ./.upstream-workspace
        run: |
          npm ci
          npm run build

      - name: Collect runtime assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        working-directory: ./.upstream-workspace
        run: |
          npm run collect-assets -- --use-release

      - name: Verify runtime assets downloaded
        working-directory: ./.upstream-workspace
        run: |
          echo "🔍 Verifying required runtime assets..."
          MISSING=0

          # Language extension provider binaries (must be bundled — no runtime fallback)
          for provider in java-external-provider generic-external-provider golang-dependency-provider c-sharp-analyzer-provider; do
            DIR="downloaded_assets/${provider}"
            if [[ ! -d "$DIR" ]] || [[ -z "$(ls -A "$DIR" 2>/dev/null)" ]]; then
              echo "❌ Missing required provider binary: ${provider}"
              MISSING=$((MISSING + 1))
            else
              COUNT=$(find "$DIR" -type f | wc -l)
              echo "✅ ${provider}: ${COUNT} files"
            fi
          done

          # Seed assets
          for asset in rulesets jdtls-bundles opensource-labels-file; do
            DIR="downloaded_assets/${asset}"
            if [[ ! -d "$DIR" ]] || [[ -z "$(ls -A "$DIR" 2>/dev/null)" ]]; then
              echo "⚠️  Missing seed asset: ${asset}"
            else
              echo "✅ ${asset}: present"
            fi
          done

          # kai binary is optional (core uses fallbackAssets for runtime download)
          KAI_DIR="downloaded_assets/kai"
          if [[ -d "$KAI_DIR" ]] && [[ -n "$(ls -A "$KAI_DIR" 2>/dev/null)" ]]; then
            echo "✅ kai: present (will be bundled)"
          else
            echo "ℹ️  kai: not bundled (core extension uses fallbackAssets for runtime download)"
          fi

          if [[ $MISSING -gt 0 ]]; then
            echo ""
            echo "❌ ${MISSING} required provider binaries are missing."
            echo "❌ Language extensions will not function without these binaries."
            exit 1
          fi

          echo ""
          echo "✅ All required runtime assets verified"

      - name: Set version for build
        working-directory: ./.upstream-workspace
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            # Tagged release: use tag version
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#v}"  # Strip 'v' prefix
            echo "Setting release version: $VERSION"
            npm version "$VERSION" --workspaces --include-workspace-root --no-git-tag-version --allow-same-version
          else
            # Development build: add timestamp and SHA
            CURRENT_VERSION=$(npm pkg get version | tr -d '"')
            TIMESTAMP=$(date +%Y%m%d%H%M%S)
            SHA=$(git rev-parse --short HEAD)
            DEV_VERSION="${CURRENT_VERSION}-dev.${TIMESTAMP}.${SHA}"
            echo "Setting development version: $DEV_VERSION"
            npm version "$DEV_VERSION" --workspaces --include-workspace-root --no-git-tag-version
          fi

      - name: Package extensions
        working-directory: ./.upstream-workspace
        run: |
          npm run dist
          npm run package

      - name: List packaged extensions
        working-directory: ./.upstream-workspace
        run: |
          echo "Packaged VSIX files:"
          ls -la dist/*.vsix

      - name: Upload VSIX artifacts
        uses: actions/upload-artifact@v4
        with:
          name: vsix-artifact
          path: .upstream-workspace/dist/*.vsix

      - name: Upload VSIX artifacts (timestamped)
        uses: actions/upload-artifact@v4
        with:
          name: mta-vsix-artifact-${{ github.run_number }}
          path: .upstream-workspace/dist/*.vsix
          retention-days: 30

  e2e-test:
    name: E2E Tests
    needs: package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout MTA build repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install MTA build dependencies
        run: npm ci

      - name: Pull upstream and apply MTA branding
        run: |
          if [[ -n "${{ inputs.upstream_ref }}" ]]; then
            echo "Using override upstream ref: ${{ inputs.upstream_ref }}"
            npm run pull-upstream -- --ref=${{ inputs.upstream_ref }}
          else
            echo "Using configured upstream ref from mta-build.yaml"
            npm run pull-upstream
          fi

      - name: Install upstream dependencies
        run: npm ci
        working-directory: ./.upstream-workspace

      - name: Install test dependencies
        run: npm ci
        working-directory: ./.upstream-workspace/tests

      - name: Setup E2E test environment
        run: cp .env.ci .env
        working-directory: ./.upstream-workspace/tests

      - name: Download and Install VSCode
        run: |
          wget -qO- https://packages.microsoft.com/keys/microsoft.asc | gpg --dearmor > packages.microsoft.gpg
          sudo install -D -o root -g root -m 644 packages.microsoft.gpg /etc/apt/keyrings/packages.microsoft.gpg
          echo "deb [arch=amd64,arm64,armhf signed-by=/etc/apt/keyrings/packages.microsoft.gpg] https://packages.microsoft.com/repos/code stable main" |sudo tee /etc/apt/sources.list.d/vscode.list > /dev/null
          rm -f packages.microsoft.gpg
          sudo apt install apt-transport-https -y
          sudo apt update
          sudo apt install code -y

      - name: Set up virtual X11
        run: |
          sudo apt-get install -y \
            xvfb \
            x11-xserver-utils \
            dbus-x11 \
            xfonts-100dpi \
            xfonts-75dpi \
            libxrender1 \
            libxext6 \
            libx11-6 \
            xfonts-base \
            nickle cairo-5c \
            xorg-docs-core

      - name: Set DISPLAY environment variable
        run: |
          Xvfb :99 -screen 0 1920x1080x24 &
          echo "DISPLAY=:99" >> "$GITHUB_ENV"

      - name: Start Dbus
        run: |
          dbus-launch --exit-with-session &
          sudo service dbus start
          export XDG_RUNTIME_DIR=/run/user/$(id -u)
          sudo chmod 700 $XDG_RUNTIME_DIR
          sudo chown $(id -un):$(id -gn) $XDG_RUNTIME_DIR
          export DBUS_SESSION_BUS_ADDRESS=unix:path=$XDG_RUNTIME_DIR/bus
          dbus-daemon --session --address=$DBUS_SESSION_BUS_ADDRESS --nofork --nopidfile --syslog-only &
          mkdir -p ~/.vscode && echo '{ "disable-hardware-acceleration": true }' > ~/.vscode/argv.json

      - name: Download VSIX artifacts
        uses: actions/download-artifact@v4
        with:
          name: mta-vsix-artifact-${{ github.run_number }}
          path: ./artifacts

      - name: Set VSIX paths
        id: set_vsix_paths
        run: |
          echo "Found VSIX files:"
          find ./artifacts -name "*.vsix" -ls

          # Find each extension VSIX based on MTA naming convention
          CORE_VSIX=$(ls ./artifacts/mta-core-*.vsix 2>/dev/null | head -n 1)
          JAVA_VSIX=$(ls ./artifacts/mta-java-*.vsix 2>/dev/null | head -n 1)
          JS_VSIX=$(ls ./artifacts/mta-javascript-*.vsix 2>/dev/null | head -n 1)
          GO_VSIX=$(ls ./artifacts/mta-go-*.vsix 2>/dev/null | head -n 1)
          CSHARP_VSIX=$(ls ./artifacts/mta-csharp-*.vsix 2>/dev/null | head -n 1)

          # Verify and output
          for vsix in "$CORE_VSIX" "$JAVA_VSIX" "$JS_VSIX" "$GO_VSIX" "$CSHARP_VSIX"; do
            [ ! -f "$vsix" ] && echo "Error: VSIX not found: $vsix" && exit 1
          done

          echo "core_vsix=${CORE_VSIX}" >> $GITHUB_OUTPUT
          echo "java_vsix=${JAVA_VSIX}" >> $GITHUB_OUTPUT
          echo "javascript_vsix=${JS_VSIX}" >> $GITHUB_OUTPUT
          echo "go_vsix=${GO_VSIX}" >> $GITHUB_OUTPUT
          echo "csharp_vsix=${CSHARP_VSIX}" >> $GITHUB_OUTPUT

      - name: Run e2e tests (Linux)
        run: npx playwright test e2e/tests/base/configure-and-run-analysis.test.ts
        working-directory: ./.upstream-workspace/tests
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          CORE_VSIX_FILE_PATH: ${{ github.workspace }}/${{ steps.set_vsix_paths.outputs.core_vsix }}
          JAVA_VSIX_FILE_PATH: ${{ github.workspace }}/${{ steps.set_vsix_paths.outputs.java_vsix }}
          JAVASCRIPT_VSIX_FILE_PATH: ${{ github.workspace }}/${{ steps.set_vsix_paths.outputs.javascript_vsix }}
          GO_VSIX_FILE_PATH: ${{ github.workspace }}/${{ steps.set_vsix_paths.outputs.go_vsix }}
          CSHARP_VSIX_FILE_PATH: ${{ github.workspace }}/${{ steps.set_vsix_paths.outputs.csharp_vsix }}

      # This is intentionally kept in a separate step to avoid passing in credentials
      - name: Run e2e tests (Linux - Offline)
        run: npx playwright test e2e/tests/agent_flow_coolstore.test.ts
        working-directory: ./.upstream-workspace/tests
        env:
          OPENAI_API_KEY: <dummy> # this only exists to pass provider validation
          CORE_VSIX_FILE_PATH: ${{ github.workspace }}/${{ steps.set_vsix_paths.outputs.core_vsix }}
          JAVA_VSIX_FILE_PATH: ${{ github.workspace }}/${{ steps.set_vsix_paths.outputs.java_vsix }}
          JAVASCRIPT_VSIX_FILE_PATH: ${{ github.workspace }}/${{ steps.set_vsix_paths.outputs.javascript_vsix }}
          GO_VSIX_FILE_PATH: ${{ github.workspace }}/${{ steps.set_vsix_paths.outputs.go_vsix }}
          CSHARP_VSIX_FILE_PATH: ${{ github.workspace }}/${{ steps.set_vsix_paths.outputs.csharp_vsix }}

  publish-development:
    name: Publish Development Build
    needs: [package, e2e-test]
    runs-on: ubuntu-latest
    if: >
      ${{
        !failure() &&
        !(github.event_name == 'pull_request' && !github.event.pull_request.merged) &&
        !startsWith(github.ref, 'refs/tags/')
      }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download VSIX artifacts
        uses: actions/download-artifact@v4
        with:
          name: mta-vsix-artifact-${{ github.run_number }}
          path: ./artifacts

      - name: Debug artifacts
        run: |
          echo "Listing artifacts directory:"
          ls -la ./artifacts/
          echo "Looking for VSIX files:"
          find ./artifacts -name "*.vsix" -ls

      - name: Publish to development builds release
        run: |
          # Find all VSIX files
          VSIX_FILES=$(find ./artifacts -name "*.vsix")
          if [[ -z "$VSIX_FILES" ]]; then
            echo "Error: No VSIX files found"
            exit 1
          fi

          echo "Found VSIX files:"
          echo "$VSIX_FILES"

          # Check if we can access the release
          echo "Checking development-builds release..."
          gh release view development-builds --json name,tagName,url

          # Upload each VSIX to development-builds release
          while IFS= read -r VSIX_FILE; do
            echo "Uploading $VSIX_FILE to development-builds release..."
            gh release upload development-builds "$VSIX_FILE" --clobber
            echo "Published: $(basename "$VSIX_FILE")"
          done <<< "$VSIX_FILES"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release:
    name: Create Release
    needs: e2e-test
    if: ${{ startsWith(github.ref, 'refs/tags/v') }}
    uses: ./.github/workflows/release.yml
    with:
      tag_name: ${{ github.ref_name }}
      prerelease: ${{ contains(github.ref_name, '-') }}
      vsix_artifact_name: "vsix-artifact"
    secrets: inherit
