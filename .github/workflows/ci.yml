name: MTA CI

on:
  push:
    branches:
      - main
      - release-*
      - 'feature/**'
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - release-*
    paths-ignore:
      - 'docs/**'
      - '*.md'
  workflow_dispatch:
    inputs:
      upstream_ref:
        description: 'Override upstream ref (branch, tag, or SHA)'
        required: false
        type: string
  workflow_call:

env:
  HUSKY: 0

concurrency:
  group: mta-ci-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout MTA build repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install MTA build dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint --if-present

  build:
    name: Build Extension
    needs: lint
    runs-on: ubuntu-latest

    outputs:
      upstream_sha: ${{ steps.build_info.outputs.upstream_sha }}
      upstream_sha_short: ${{ steps.build_info.outputs.upstream_sha_short }}
      mta_version: ${{ steps.build_info.outputs.mta_version }}

    steps:
      - name: Checkout MTA build repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install MTA build dependencies
        run: npm ci

      - name: Pull upstream and apply MTA branding
        run: |
          if [[ -n "${{ inputs.upstream_ref }}" ]]; then
            echo "Using override upstream ref: ${{ inputs.upstream_ref }}"
            npm run pull-upstream -- --ref=${{ inputs.upstream_ref }}
          else
            echo "Using configured upstream ref from mta-build.yaml"
            npm run pull-upstream
          fi

      - name: Extract build info
        id: build_info
        run: |
          UPSTREAM_SHA=$(git rev-parse HEAD)
          UPSTREAM_SHA_SHORT=$(git rev-parse --short HEAD)
          echo "upstream_sha=${UPSTREAM_SHA}" >> $GITHUB_OUTPUT
          echo "upstream_sha_short=${UPSTREAM_SHA_SHORT}" >> $GITHUB_OUTPUT

          # Get MTA version from transformed package.json
          MTA_VERSION=$(node -p "require('./vscode/package.json').version")
          echo "mta_version=${MTA_VERSION}" >> $GITHUB_OUTPUT
        working-directory: ./.upstream-workspace

      - name: Display build configuration
        run: |
          echo "## MTA Build Configuration" >> $GITHUB_STEP_SUMMARY
          echo "- **Upstream SHA**: \`${{ steps.build_info.outputs.upstream_sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **MTA Version**: \`${{ steps.build_info.outputs.mta_version }}\`" >> $GITHUB_STEP_SUMMARY

      - name: Install upstream dependencies
        run: |
          npm ci

      - name: Build extension
        run: npm run build
        working-directory: ./.upstream-workspace

      - name: Verify MTA branding applied
        run: |
          # Check that package.json has correct MTA branding
          PACKAGE_NAME=$(node -p "require('./vscode/package.json').name")
          if [[ "$PACKAGE_NAME" != "mta-vscode-extension" ]]; then
            echo "❌❌❌ FATAL: MTA branding failed!"
            echo "❌ Expected package name: mta-vscode-extension"
            echo "❌ Actual package name: $PACKAGE_NAME"
            echo "❌❌❌ Build cannot continue without proper branding ❌❌❌"
            exit 1
          fi
          echo "✅ MTA branding verification passed: $PACKAGE_NAME"
        working-directory: ./.upstream-workspace

  test:
    name: Test
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout MTA build repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install MTA build dependencies
        run: npm ci

      - name: Pull upstream and apply MTA branding
        run: |
          if [[ -n "${{ inputs.upstream_ref }}" ]]; then
            echo "Using override upstream ref: ${{ inputs.upstream_ref }}"
            npm run pull-upstream -- --ref=${{ inputs.upstream_ref }}
          else
            echo "Using configured upstream ref from mta-build.yaml"
            npm run pull-upstream
          fi

      - name: Install upstream dependencies
        run: npm ci
        working-directory: ./.upstream-workspace

      - name: Run tests
        run: xvfb-run -a npm test
        working-directory: ./.upstream-workspace

  package:
    name: Package Extension
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout MTA build repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install MTA build dependencies
        run: npm ci

      - name: Pull upstream and apply MTA branding
        run: |
          if [[ -n "${{ inputs.upstream_ref }}" ]]; then
            echo "Using override upstream ref: ${{ inputs.upstream_ref }}"
            npm run pull-upstream -- --ref=${{ inputs.upstream_ref }}
          else
            echo "Using configured upstream ref from mta-build.yaml"
            npm run pull-upstream
          fi

      - name: Extract build info
        id: build_info
        run: |
          UPSTREAM_SHA=$(git rev-parse HEAD)
          UPSTREAM_SHA_SHORT=$(git rev-parse --short HEAD)
          echo "upstream_sha=${UPSTREAM_SHA}" >> $GITHUB_OUTPUT
          echo "upstream_sha_short=${UPSTREAM_SHA_SHORT}" >> $GITHUB_OUTPUT

          # Get MTA version from transformed package.json
          MTA_VERSION=$(node -p "require('./vscode/package.json').version")
          echo "mta_version=${MTA_VERSION}" >> $GITHUB_OUTPUT
        working-directory: ./.upstream-workspace

      - name: Version management for development builds
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        run: |
          # Update version for development build
          CURRENT_VERSION=$(node -p "require('./vscode/package.json').version")
          DEV_VERSION="${CURRENT_VERSION}-dev.${{ github.run_number }}"
          npm version $DEV_VERSION --no-git-tag-version --workspace=vscode
          echo "Set development version: $DEV_VERSION"
        working-directory: ./.upstream-workspace

      - name: Install upstream dependencies
        run: npm ci
        working-directory: ./.upstream-workspace

      - name: Build extension
        run: npm run build
        working-directory: ./.upstream-workspace

      - name: Create distribution and package
        run: |
          npm run dist
          npm run package
        working-directory: ./.upstream-workspace

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: mta-vsix-artifact-${{ github.run_number }}
          path: .upstream-workspace/dist/*.vsix
          retention-days: 30

  e2e-test:
    name: E2E Tests
    needs: package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout MTA build repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install MTA build dependencies
        run: npm ci

      - name: Pull upstream and apply MTA branding
        run: |
          if [[ -n "${{ inputs.upstream_ref }}" ]]; then
            echo "Using override upstream ref: ${{ inputs.upstream_ref }}"
            npm run pull-upstream -- --ref=${{ inputs.upstream_ref }}
          else
            echo "Using configured upstream ref from mta-build.yaml"
            npm run pull-upstream
          fi

      - name: Install upstream dependencies
        run: npm ci
        working-directory: ./.upstream-workspace

      - name: Install test dependencies
        run: npm ci
        working-directory: ./.upstream-workspace/tests

      - name: Setup E2E test environment
        run: cp .env.ci .env
        working-directory: ./.upstream-workspace/tests

      - name: Download and Install VSCode
        run: |
          wget -qO- https://packages.microsoft.com/keys/microsoft.asc | gpg --dearmor > packages.microsoft.gpg
          sudo install -D -o root -g root -m 644 packages.microsoft.gpg /etc/apt/keyrings/packages.microsoft.gpg
          echo "deb [arch=amd64,arm64,armhf signed-by=/etc/apt/keyrings/packages.microsoft.gpg] https://packages.microsoft.com/repos/code stable main" |sudo tee /etc/apt/sources.list.d/vscode.list > /dev/null
          rm -f packages.microsoft.gpg
          sudo apt install apt-transport-https -y
          sudo apt update
          sudo apt install code -y

      - name: Set up virtual X11
        run: |
          sudo apt-get install -y \
            xvfb \
            x11-xserver-utils \
            dbus-x11 \
            xfonts-100dpi \
            xfonts-75dpi \
            libxrender1 \
            libxext6 \
            libx11-6 \
            xfonts-base \
            nickle cairo-5c \
            xorg-docs-core

      - name: Set DISPLAY environment variable
        run: |
          Xvfb :99 -screen 0 1920x1080x24 &
          echo "DISPLAY=:99" >> "$GITHUB_ENV"

      - name: Start Dbus
        run: |
          dbus-launch --exit-with-session &
          sudo service dbus start
          export XDG_RUNTIME_DIR=/run/user/$(id -u)
          sudo chmod 700 $XDG_RUNTIME_DIR
          sudo chown $(id -un):$(id -gn) $XDG_RUNTIME_DIR
          export DBUS_SESSION_BUS_ADDRESS=unix:path=$XDG_RUNTIME_DIR/bus
          dbus-daemon --session --address=$DBUS_SESSION_BUS_ADDRESS --nofork --nopidfile --syslog-only &
          mkdir -p ~/.vscode && echo '{ "disable-hardware-acceleration": true }' > ~/.vscode/argv.json

      - name: Download VSIX artifact
        uses: actions/download-artifact@v4
        with:
          name: mta-vsix-artifact-${{ github.run_number }}
          path: ./artifacts

      - name: Set VSIX path
        id: set_vsix_path
        run: echo "vsix_path=$(ls -1 ./artifacts/*.vsix)" >> $GITHUB_OUTPUT

      - name: Run e2e tests (Linux)
        run: npx playwright test e2e/tests/base/configure-and-run-analysis.test.ts
        working-directory: ./.upstream-workspace/tests
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          VSIX_FILE_PATH: ${{ github.workspace }}/${{ steps.set_vsix_path.outputs.vsix_path }}

      # This is intentionally kept in a separate step to avoid passing in credentials
      - name: Run e2e tests (Linux - Offline)
        run: npx playwright test e2e/tests/agent_flow_coolstore.test.ts
        working-directory: ./.upstream-workspace/tests
        env:
          VSIX_FILE_PATH: ${{ github.workspace }}/${{ steps.set_vsix_path.outputs.vsix_path }}
          OPENAI_API_KEY: <dummy> # this only exists to pass provider validation

  publish-development:
    name: Publish Development Build
    needs: [package, e2e-test]
    runs-on: ubuntu-latest
    if: >
      ${{
        !failure() &&
        !(github.event_name == 'pull_request' && !github.event.pull_request.merged) &&
        !startsWith(github.ref, 'refs/tags/')
      }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download VSIX artifact
        uses: actions/download-artifact@v4
        with:
          name: mta-vsix-artifact-${{ github.run_number }}
          path: ./artifacts

      - name: Debug artifacts
        run: |
          echo "Listing artifacts directory:"
          ls -la ./artifacts/
          echo "Looking for VSIX files:"
          find ./artifacts -name "*.vsix" -ls

      - name: Publish to development builds release
        run: |
          # Find VSIX file
          VSIX_FILE=$(find ./artifacts -name "*.vsix" | head -1)
          if [[ -z "$VSIX_FILE" ]]; then
            echo "Error: No VSIX file found"
            exit 1
          fi

          echo "Found VSIX file: $VSIX_FILE"
          echo "File size: $(ls -lh "$VSIX_FILE")"

          # Check if we can access the release
          echo "Checking development-builds release..."
          gh release view development-builds --json name,tagName,url

          # Upload to development-builds release
          echo "Uploading $VSIX_FILE to development-builds release..."
          gh release upload development-builds "$VSIX_FILE" --clobber
          echo "Published development build: $(basename "$VSIX_FILE")"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release:
    name: Create Release
    needs: [package, e2e-test]
    runs-on: ubuntu-latest
    if: ${{ startsWith(github.ref, 'refs/tags/') }}

    steps:
      - name: Download VSIX artifact
        uses: actions/download-artifact@v4
        with:
          name: mta-vsix-artifact-${{ github.run_number }}
          path: ./artifacts

      - name: Create GitHub release
        run: |
          VSIX_FILE=$(find ./artifacts -name "*.vsix" | head -1)
          RELEASE_NAME="${{ github.ref_name }}"

          gh release create "${{ github.ref_name }}" \
            --title "MTA Extension $RELEASE_NAME" \
            --notes "Migration Toolkit for Applications extension release $RELEASE_NAME

          ## Installation
          Download the .vsix file and install using 'Extensions: Install from VSIX...' in VS Code.

          ## Changes
          See the full changelog in the repository." \
            "$VSIX_FILE"
        env:
          GITHUB_TOKEN: ${{ github.token }}

      # TODO: Add marketplace publishing when ready
      # - name: Publish to VS Code Marketplace
      #   run: npx vsce publish --packagePath "$VSIX_FILE"
      #   env:
      #     VSCE_PAT: ${{ secrets.VSCE_PAT }}

      # - name: Publish to Open VSX
      #   run: npx ovsx publish "$VSIX_FILE"
      #   env:
      #     OVSX_PAT: ${{ secrets.OVSX_PAT }}